name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -q --tb=short
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_memescope.db
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
          REDIS_URL: redis://localhost:6379/0
          HELIUS_API_KEY: ci-test-key
          BIRDEYE_API_KEY: ci-test-key
          APP_ENV: development

  frontend-checks:
    name: Frontend Checks (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0
        continue-on-error: true
