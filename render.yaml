services:
  # ── Web API ─────────────────────────────────────────────────────────────────
  - type: web
    name: memescope-api
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_CORS_ORIGINS
        sync: false
      - key: APP_API_KEY
        sync: false

  # ── Workers ──────────────────────────────────────────────────────────────────
  - type: worker
    name: memescope-parser
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) python start_worker.py parser
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false

  - type: worker
    name: memescope-signal
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) python start_worker.py signal
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  - type: worker
    name: memescope-holder
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) python start_worker.py holder
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false

  - type: worker
    name: memescope-pumpfun
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) python start_worker.py pumpfun
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
