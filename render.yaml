services:
  # ── Web API ─────────────────────────────────────────────────────────────────
  - type: web
    name: memescope-api
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_CORS_ORIGINS
        sync: false
      - key: APP_API_KEY
        sync: false

  # ── Workers (all 4 in one web service process) ──────────────────────────────
  - type: web
    name: memescope-workers
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=$(pwd) python -m workers.main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: APP_ENV
        value: production
